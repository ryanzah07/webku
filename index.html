<!DOCTYPE html>
<html>
<head>
    <title>Follow Instagram Saya</title>

    <style>
            body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background: url('bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
            }

        .container {
    padding: 50px 20px;
    min-height: 100vh;
        }

        .profile {
            animation: muncul 1s ease;
        }

        .profile img {
            width: 370px;
            height: 370px;
            border-radius: 60%;
            border: 4px solid white;
        }

        h1 {
    margin: 10px 0;
    font-size: 50px;
    font-weight: bold;
    color: red;

    /* efek tepi hitam */
    text-shadow: 
        -2px -2px 0 black,
        2px -2px 0 black,
        -2px 2px 0 black,
        2px 2px 0 black;
}

p {
    font-size: 25px;
    font-weight: bold;
    color: red;
    opacity: 1;

    /* efek tepi hitam */
    text-shadow: 
        -1px -1px 0 black,
        1px -1px 0 black,
        -1px 1px 0 black,
        1px 1px 0 black;
}

        

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #e1306c;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
            transform: scale(1.05);
        }

        @keyframes muncul {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    <style>
    /* CSS sebelumnya */

    .profile {
        animation: muncul 1s ease;
    }

    @keyframes muncul {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<audio id="musik" autoplay loop muted>
  <source src="calon.mp3" type="audio/mpeg">
</audio>

<script>
function nyalakanMusik() {
  const audio = document.getElementById('musik');
  audio.muted = false;
  audio.play();

  // biar cuma sekali jalan
  document.removeEventListener('click', nyalakanMusik);
  document.removeEventListener('touchstart', nyalakanMusik);
}

document.addEventListener('click', nyalakanMusik);
document.addEventListener('touchstart', nyalakanMusik);
</script>

<div class="container">
    <div class="profile">
        
        <!-- GANTI FOTO -->
        <img src="anjay.jpg">

        <!-- GANTI NAMA -->
        <h1>@lemonchild_2608</h1>

        <!-- GANTI DESKRIPSI -->
        <p>Follow Instagram aku untuk konten menarik 🔥</p>

        <!-- GANTI LINK IG -->
        <a href="https://instagram.com/lemonchild_2608" class="btn" target="_blank">
    Follow Sekarang
        </a>
    </div>

</div>

</body>
</html>
