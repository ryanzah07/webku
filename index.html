<!DOCTYPE html>
<html>
<head>
    <title>Web Keren Saya</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        h1 {
            margin-top: 100px;
            animation: muncul 2s ease;
        }

        p {
            animation: muncul 3s ease;
        }

        @keyframes muncul {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: black;
            border-radius: 10px;
            cursor: pointer;
            animation: muncul 4s ease;
        }

        button:hover {
            transform: scale(1.1);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <h1>Halo, ini website saya 🚀</h1>
    <p>Website saya sekarang ada animasi 😎</p>
    <button onclick="alert('Halo juga!')">Klik Saya</button>

</body>
</html>
