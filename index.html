<!DOCTYPE html>
<html>
<head>
    <title>Follow Instagram Saya</title>

    <style>
            body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background: url('bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
            }

        .container {
    padding: 50px 20px;
    min-height: 100vh;
        }

        .profile {
            animation: muncul 1s ease;
        }

        .profile img {
            width: 370px;
            height: 370px;
            border-radius: 60%;
            border: 4px solid white;
        }

        h1 {
    margin: 10px 0;
    font-size: 50px;
    font-weight: bold;
    color: red;

    /* efek tepi hitam */
    text-shadow: 
        -2px -2px 0 black,
        2px -2px 0 black,
        -2px 2px 0 black,
        2px 2px 0 black;
}

p {
    font-size: 25px;
    font-weight: bold;
    color: red;
    opacity: 1;

    /* efek tepi hitam */
    text-shadow: 
        -1px -1px 0 black,
        1px -1px 0 black,
        -1px 1px 0 black,
        1px 1px 0 black;
}

        

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #e1306c;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
            transform: scale(1.05);
        }

        @keyframes muncul {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    <style>
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.5s ease forwards;
}

.fade-in:nth-child(1) { animation-delay: 0.5s; }
.fade-in:nth-child(2) { animation-delay: 1s; }
.fade-in:nth-child(3) { animation-delay: 1.5s; }

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
    
/* ===== BACKGROUND GERAK ===== */
body {
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* ANIMASI BACKGROUND */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== CONTAINER GLASS ===== */
.container {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  width: 80%;
  margin: 80px auto;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* ===== FOTO ===== */
.profile img {
  width: 150px;
  border-radius: 50%;
  transition: 0.4s;
}

/* HOVER FOTO */
.profile img:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px cyan;
}

/* ===== ANIMASI MASUK ===== */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.5s ease forwards;
}

/* DELAY */
.fade-in:nth-child(1) { animation-delay: 0.5s; }
.fade-in:nth-child(2) { animation-delay: 1s; }
.fade-in:nth-child(3) { animation-delay: 1.5s; }

/* KEYFRAMES */
@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== ANIMASI MELAYANG ===== */
.float {
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* ===== TEKS GLOW ===== */
h1 {
  text-shadow: 0 0 10px cyan;
}

/* ===== TOMBOL ===== */
.btn {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, cyan, blue);
  color: white;
  transition: 0.3s;
  margin-top: 20px;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px cyan;
} </style>

</head>

<body>

<audio id="musik" autoplay loop muted>
  <source src="calon.mp3" type="audio/mpeg">
</audio>

<script>
function nyalakanMusik() {
  const audio = document.getElementById('musik');
  audio.muted = false;
  audio.play();
}

document.addEventListener('click', nyalakanMusik);
document.addEventListener('touchstart', nyalakanMusik);
document.addEventListener('scroll', nyalakanMusik);
</script>

<div class="container">
    <div class="profile fade-in float">
        
        <!-- GANTI FOTO -->
        <img src="anjay.jpg">

        <!-- GANTI NAMA -->
        <h1>@lemonchild_2608</h1>

        <!-- GANTI DESKRIPSI -->
        <p>Mutualan skuy follow akun gua nanti langsung di flbk🤩🔥</p>

        <!-- GANTI LINK IG -->
        <a href="https://instagram.com/lemonchild_2608" class="btn" target="_blank">
    Follow Sekarang 
        </a>
        <button class="btn fade-in">Klik Saya</button>
        
    </div>

</div>

</body>
</html>
